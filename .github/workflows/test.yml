name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/catalogguard_lite_test"
      TEST_DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/catalogguard_lite_test"
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: catalogguard_lite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d catalogguard_lite_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-api.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-api.txt pytest==9.1.1
      - name: Apply database migrations
        run: python -m alembic upgrade head
      - name: Run tests
        run: python -m pytest -q
