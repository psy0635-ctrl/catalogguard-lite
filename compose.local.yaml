name: catalogguard-lite-local

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in the local env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the local env file}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in the local env file}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: catalogguard-lite-api:local
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - >-
        python -m alembic upgrade head &&
        exec uvicorn api.main:app --host 0.0.0.0 --port 8000 --no-access-log
    ports:
      - "${API_HOST_PORT:-8001}:8000"

volumes:
  postgres_data:
